<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/iconefalai.png') }}" type="image/x-icon">
    <title>Cadastro ADMIN</title>
    <script src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
</head>
<body>
    <div class="auth-container">
        <form method="POST" class="auth-box" enctype="multipart/form-data">
            <div class="auth-header">
                <img src="{{ url_for('static', filename='icons/iconefalai.png') }}" alt="Falaí Logo" class="auth-logo">
                <h2>Cadastro Falaí ADMIN</h2>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="alert-container">
                        {% for categoria, mensagem in messages %}
                            <div class="alert alert-{{ 'success' if categoria == 'sucesso' else 'error' if categoria == 'erro' else 'info' }}">
                                {{ mensagem }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <div class="upload-container">
                <label for="foto_perfil" class="upload-label">
                    <img src="{{ url_for('static', filename='icons/perfilplaceholder.png')}}"
                         alt="Foto de perfil"
                         id="preview-foto-perfil"
                         class="upload-preview">
                </label>
                <input type="file"
                       id="foto_perfil"
                       name="foto_perfil"
                       accept="image/*"
                       class="file-input"
                       onchange="previewImage(this)">
                <p class="upload-hint">Clique para adicionar foto</p>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="nome_login" class="form-label">Nome de usuário:</label>
                    <input type="text" id="nome_login" name="nome_login" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">E-mail:</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="senha" class="form-label">Senha:</label>
                    <input type="password" id="senha" name="senha" class="form-control" required>
                </div>

                <!-- <div class="form-group">
                    <label for="telefone" class="form-label">Telefone:</label>
                    <input type="text" id="telefone" name="telefone" class="form-control" required pattern="[0-9]{8,}">
                </div> -->
            </div>

            <button type="submit" class="btn btn-primary btn-block">Criar Conta</button>
            
            <div class="mt-3 text-center">
                <a href="{{ url_for('admin_index') }}" class="btn btn-secondary">
                    voltar
                </a>
            </div>
        </form>
    </div>

    <script>
        function previewImage(input) {
            const preview = document.getElementById('preview-foto-perfil');
            const file = input.files[0];
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                }
                reader.readAsDataURL(file);
            } else {
                preview.src = "{{ url_for('static', filename='icons/perfilplaceholder.png') }}";
            }
        }
    </script>
</body>
</html>
