<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/iconefalai.png') }}" type="image/x-icon">
    <title>Falaí Login</title>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <img src="{{ url_for('static', filename='icons/iconefalai.png') }}" alt="Falaí Logo" class="auth-logo">
                <h2>Bem-vindo de volta ao Falaí</h2>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="alert-container">
                        {% for categoria, mensagem in messages %}
                            <div class="alert alert-{{ 'success' if categoria == 'sucesso' else 'error' if categoria == 'erro' else 'info' }}">
                                {{ mensagem }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="usuario" class="form-label">Usuário:</label>
                    <input type="text" name="usuario" id="usuario" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="senha" class="form-label">Senha:</label>
                    <input type="password" name="senha" id="senha" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Entrar</button>
                
                <div class="mt-3 text-center">
                    <a href="{{ url_for('cadastro_usuario') }}" class="btn btn-secondary">
                        Não tem uma conta? Cadastre-se
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
